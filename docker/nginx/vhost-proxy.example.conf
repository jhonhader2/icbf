# HTTP → redirigir a HTTPS (activo cuando tengas certificado)
server {
    listen 80;
    server_name icbf.dataguaviare.com.co;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name icbf.dataguaviare.com.co;

    # Certificados (Certbot los rellena en /etc/letsencrypt/live/...)
    ssl_certificate     /etc/letsencrypt/live/icbf.dataguaviare.com.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icbf.dataguaviare.com.co/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:9084;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
