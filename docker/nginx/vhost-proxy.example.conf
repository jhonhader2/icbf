# Ejemplo de vhost para el Nginx del HOST (no el del contenedor).
# Copiar a /etc/nginx/sites-available/ o incluir donde tengas los otros sitios.
# Ajusta el puerto: 9084 (dev) o el que tengas en APP_PORT; en prod puede ser 80.

