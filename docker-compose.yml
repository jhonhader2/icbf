services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icbf-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: icbf-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9084}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icbf-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120", "--queue=${QUEUE_WORKER_QUEUES:-default,icbf}"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icbf-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: icbf-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-icbf}
      MYSQL_USER: ${MYSQL_USER:-icbf}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-icbf}
      TZ: ${TZ:-UTC}
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    container_name: icbf-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_HOST:-63791}:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer:4
    container_name: icbf-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-9085}:8080"

volumes:
  mysql_data:
  redis_data:
