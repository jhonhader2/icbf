# Producción: usar con variables de entorno seguras y HTTPS delante.
# No incluye Adminer; MySQL/Redis no se exponen al host.
# Código: montar el directorio desplegado (ej. /opt/icbf) o usar imagen con código (Dockerfile.prod).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: icbf-app:prod
    container_name: icbf-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: icbf-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: icbf-app:prod
    container_name: icbf-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120", "--queue=${QUEUE_WORKER_QUEUES:-default,icbf}"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: icbf-app:prod
    container_name: icbf-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: icbf-mysql
    restart: unless-stopped
    environment:
      # MySQL 8 exige contraseña de root no vacía; si faltan, el contenedor queda unhealthy.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-icbf_root_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-icbf}
      MYSQL_USER: ${MYSQL_USER:-icbf}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-icbf}
      TZ: ${TZ:-UTC}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30
    # Puertos no expuestos en prod; quitar el bloque 'ports' si lo añadiste en dev

  redis:
    image: redis:7.4-alpine
    container_name: icbf-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Sin ports en prod; solo red interna

volumes:
  mysql_data:
  redis_data:
