# Al hacer push a main: construye la imagen Docker y opcionalmente despliega en el servidor.
# Para activar el despliegue automático, configura en GitHub: Settings → Secrets and variables → Actions:
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, y opcionalmente DEPLOY_PATH (ruta del proyecto en el servidor).

name: Docker update on main

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/icbf-app:latest
            ghcr.io/${{ github.repository_owner }}/icbf-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    # Solo ejecuta deploy si configuraste el secret SSH_HOST (Settings → Secrets → Actions)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.SSH_HOST != ''

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/var/www/icbf' }}
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml build --no-cache app queue scheduler
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T app php artisan config:clear
            docker compose -f docker-compose.prod.yml exec -T app php artisan cache:clear
